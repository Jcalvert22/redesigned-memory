<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — All Around Athlete</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="card">
    <h2>Login</h2>

    <div id="alert" class="alert alert-error" style="display:none"></div>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>

    <p class="auth-footer">No account? <a href="register.html">Register here</a></p>
    <p class="auth-footer"><a href="index.html">← Back to Workout Generator</a></p>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script>
  // Show message from redirect (e.g. guard or logout)
  const params  = new URLSearchParams(window.location.search);
  const msgText = params.get('msg');
  if (msgText) {
    const alert = document.getElementById('alert');
    alert.textContent = msgText;
    alert.style.display = 'block';
  }

  // If already logged in, skip login page
  if (Auth.isLoggedIn()) {
    window.location.href = 'exercises.html';
  }

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    const result = Auth.login(username, password);
    if (result.ok) {
      window.location.href = 'exercises.html';
    } else {
      const alert = document.getElementById('alert');
      alert.textContent = result.msg;
      alert.style.display = 'block';
    }
  });
</script>

</body>
</html>
