<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — All Around Athlete</title>
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Config injected at deploy time (placeholders replaced by GitHub Actions) -->
  <script>
    window.__AAA_CONFIG__ = {
      SUPABASE_URL:      "{{SUPABASE_URL}}",
      SUPABASE_ANON_KEY: "{{SUPABASE_ANON_KEY}}"
    };
  </script>
</head>
<body>

<div class="auth-wrapper">
  <div class="card">
    <h2>Login</h2>

    <div id="alert" class="alert alert-error" style="display:none"></div>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus
             autocomplete="username">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required
             autocomplete="current-password">

      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">
        Login
      </button>
    </form>

    <p class="auth-footer">No account? <a href="register.html">Register here</a></p>
    <p class="auth-footer"><a href="index.html">← Back to Workout Generator</a></p>
  </div>
</div>

<script type="module">
  import { loginWithUsername } from '/public/js/login.js';
  import { supabase }          from '/public/js/supabase.js';

  const alertEl   = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');

  // Show redirect message (e.g. from guard.js)
  const msg = new URLSearchParams(window.location.search).get('msg');
  if (msg) {
    alertEl.textContent  = msg;
    alertEl.style.display = 'block';
  }

  // If session already exists, skip login
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'exercises.html';

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    alertEl.style.display = 'none';
    submitBtn.disabled    = true;
    submitBtn.textContent = 'Logging in…';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    const result = await loginWithUsername(username, password);

    if (result.ok) {
      window.location.href = 'exercises.html';
    } else {
      alertEl.textContent   = result.msg;
      alertEl.style.display = 'block';
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Login';
    }
  });
</script>

</body>
</html>
