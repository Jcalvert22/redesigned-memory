name: deploy-main-to-gcp.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/final-key
          chmod 600 ~/.ssh/final-key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts        
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: /home/jacecalvert04/redesigned-memory
          PM2_NAME: ${{ vars.PM2_NAME }}
        run: |
          ssh -i ~/.ssh/final-key -T "$SSH_USER@$SSH_HOST" bash -c '
            set -e

            # Fix Git safe directory issue
            git config --global --add safe.directory "$APP_DIR"

            cd "$APP_DIR"

            git pull origin main
            sudo npm ci

            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.mjs --name "$PM2_NAME"

            pm2 save
          '