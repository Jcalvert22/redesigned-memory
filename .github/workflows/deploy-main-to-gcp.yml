name: deploy-main-to-gcp.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/aaa-deploy-key
          chmod 600 ~/.ssh/aaa-deploy-key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      - name: Debug SSH key
        run: |
         echo "Listing ~/.ssh:"
         ls -la ~/.ssh
         echo "Key file size:"
         wc -c ~/.ssh/aaa-deploy-key || echo "Key file missing"
         echo "Key line count:"
         wc -l ~/.ssh/aaa-deploy-key
         echo "Key first line:"
         head -1 ~/.ssh/aaa-deploy-key
         echo "Key last line:"
         tail -1 ~/.ssh/aaa-deploy-key
      - name: Deploy over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: /home/jacecalvert04/redesigned-memory
          PM2_NAME: ${{ vars.PM2_NAME }}
        run: |
          ssh -i ~/.ssh/aaa-deploy-key \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            "jacecalvert04@$SSH_HOST" 'bash -s' << EOF
            set -e
            echo "WHOAMI:"
            whoami
            echo "HOME DIR:"
            echo $HOME
            echo "APP_DIR VALUE:"
            echo "$APP_DIR"
            echo "PWD BEFORE CD:"
            pwd
            echo "TRYING TO CD INTO APP_DIR:"
            cd "$APP_DIR" || { echo "FAILED TO CD INTO $APP_DIR"; exit 1;}      
            echo "PWD AFTER CD:"
            pwd
            echo "LISTING DIRECTORY CONTENTS:"
            ls -la
            git pull
            npm ci
            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.mjs --name "$PM2_NAME"
            pm2 save
          EOF
