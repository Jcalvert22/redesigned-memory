name: deploy-main-to-gcp.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Prepare SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Debug SSH key
        shell: bash
        run: |
          echo "Listing $HOME/.ssh:"
          ls -la "$HOME/.ssh"
          echo "Key file size:"
          wc -c "$HOME/.ssh/id_ed25519" || echo "Key file missing"
          echo "Key line count:"
          wc -l "$HOME/.ssh/id_ed25519"
          echo "Key first line:"
          head -1 "$HOME/.ssh/id_ed25519"
          echo "Key last line:"
          tail -1 "$HOME/.ssh/id_ed25519"

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: /home/jacecalvert04/redesigned-memory
          PM2_NAME: ${{ vars.PM2_NAME }}
        run: |
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            "jacecalvert04@$SSH_HOST" 'bash -s' << 'EOF'
            set -e
            cd "$APP_DIR"
            git pull
            npm ci
            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.mjs --name "$PM2_NAME"
            pm2 save
          EOF


