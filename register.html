<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — All Around Athlete</title>
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Config injected at deploy time (placeholders replaced by GitHub Actions) -->
  <script>
    window.__AAA_CONFIG__ = {
      SUPABASE_URL:      "{{SUPABASE_URL}}",
      SUPABASE_ANON_KEY: "{{SUPABASE_ANON_KEY}}"
    };
  </script>
</head>
<body>

<div class="auth-wrapper">
  <div class="card">
    <h2>Register</h2>

    <div id="alert" class="alert" style="display:none"></div>

    <form id="register-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus
             autocomplete="username">

      <label for="email">Email <small>(used internally, not shown publicly)</small></label>
      <input type="email" id="email" name="email" required
             autocomplete="email">

      <label for="password">Password <small>(min. 6 characters)</small></label>
      <input type="password" id="password" name="password" required
             autocomplete="new-password">

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" required
             autocomplete="new-password">

      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">
        Create Account
      </button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script type="module">
  import { signup } from '/public/js/signup.js';

  const alertEl   = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');

  function showAlert(msg, type = 'error') {
    alertEl.textContent  = msg;
    alertEl.className    = `alert alert-${type}`;
    alertEl.style.display = 'block';
  }

  document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    alertEl.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (password !== confirm) {
      showAlert('Passwords do not match.');
      return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Creating account…';

    const result = await signup(username, email, password);

    if (result.ok) {
      showAlert('Account created! Check your email to confirm, then login.', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 2500);
    } else {
      showAlert(result.msg);
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Create Account';
    }
  });
</script>

</body>
</html>
