<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — All Around Athlete</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="card">
    <h2>Register</h2>

    <div id="alert" class="alert" style="display:none"></div>

    <form id="register-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>

      <label for="password">Password <small>(min. 6 characters)</small></label>
      <input type="password" id="password" name="password" required>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" required>

      <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const alertEl  = document.getElementById('alert');

    if (password !== confirm) {
      alertEl.textContent  = 'Passwords do not match.';
      alertEl.className    = 'alert alert-error';
      alertEl.style.display = 'block';
      return;
    }

    const result = Auth.register(username, password);

    if (result.ok) {
      alertEl.textContent  = 'Account created! Redirecting to login…';
      alertEl.className    = 'alert alert-success';
      alertEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    } else {
      alertEl.textContent  = result.msg;
      alertEl.className    = 'alert alert-error';
      alertEl.style.display = 'block';
    }
  });
</script>

</body>
</html>
